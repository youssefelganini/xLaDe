name: Mirrors

on:
  push:
  create:
  delete:
  workflow_dispatch:

concurrency:
  group: mirrors
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Mirror repository to all platforms
        shell: bash
        run: |
          set -e

          REPO="xLaDe"
          GH_USER="LakshitSinghBishtTM"
          LOWER_USER="lakshitsinghbishttm"

          echo "Cloning GitHub source..."
          git clone --mirror https://github.com/$GH_USER/$REPO.git
          cd $REPO.git

          echo "Removing GitHub PR refs..."
          git for-each-ref --format="%(refname)" refs/pull/ | while read ref; do
            git update-ref -d "$ref"
          done

          echo "Pushing to GitLab..."
          git push --mirror https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/$GH_USER/$REPO.git || echo "GitLab push failed"

          echo "Pushing to Codeberg..."
          git push --mirror https://oauth2:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/$LOWER_USER/$REPO.git || echo "Codeberg push failed"

          echo "Pushing to Bitbucket..."
          git push --mirror https://x-token-auth:${{ secrets.BITBUCKET_TOKEN }}@bitbucket.org/$LOWER_USER/xlade.git || echo "Bitbucket push failed"

          echo "Pushing to Gitea..."
          git push --mirror https://${{ secrets.GITEA_TOKEN }}@gitea.com/$GH_USER/$REPO.git || echo "Gitea push failed"

          echo "All mirror attempts completed."
