name: Kernel Protection

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  kernel-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Kernel boundary check
        run: |
          if ! git rev-parse --is-inside-work-tree > /dev/null 2>&1; then
            echo "[skip] Not a Git repository. Kernel integrity check skipped."
            exit 0
          fi
          if git diff --name-only origin/main | grep "^lean-core/" ; then
            echo "[error] Kernel modification detected in lean-core/"
            echo "        Modifications to the Lean kernel are not accepted."
            echo "        See policies/kernel-protection.md for details."
            exit 1
          else
            echo "[ok] Kernel untouched."
          fi