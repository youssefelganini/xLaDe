name: Formatting

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install black flake8 isort pytest

      - name: Check import order
        run: |
          echo "--- isort ---"
          isort --check-only .

      - name: Check code formatting
        run: |
          echo "--- black ---"
          black --check .

      - name: Run flake8
        run: |
          echo "--- flake8 ---"
          flake8 .

      - name: Run unit tests
        run: |
          echo "--- pytest ---"
          pytest tests/ -v